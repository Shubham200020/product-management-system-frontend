<div class="register-container">
  <div class="glass-card">
    <div class="header">
      <h1>Create Account</h1>
      <p>Join the system to start managing products</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-grid">
        <div class="input-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" [(ngModel)]="userData.name" required #nameInput="ngModel" placeholder="John Doe">
          <div class="field-error" *ngIf="nameInput.invalid && (nameInput.dirty || nameInput.touched)">
            <small *ngIf="nameInput.errors?.['required']">Name is required.</small>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="userData.email" required email #emailInput="ngModel" placeholder="john@example.com">
          <div class="field-error" *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)">
            <small *ngIf="emailInput.errors?.['required']">Email is required.</small>
            <small *ngIf="emailInput.errors?.['email']">Please enter a valid email.</small>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              id="password" 
              name="password" 
              [(ngModel)]="userData.password" 
              required 
              minlength="6" 
              #passwordInput="ngModel" 
              placeholder="••••••••"
            >
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" tabindex="-1">
              <span class="icon">{{ showPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
          <div class="field-error" *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)">
            <small *ngIf="passwordInput.errors?.['required']">Password is required.</small>
            <small *ngIf="passwordInput.errors?.['minlength']">Password must be at least 6 characters.</small>
          </div>
        </div>

        <div class="input-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" [(ngModel)]="userData.phone" required pattern="[0-9]{10}" maxlength="10" #phoneInput="ngModel" placeholder="10 digit number">
          <div class="field-error" *ngIf="phoneInput.invalid && (phoneInput.dirty || phoneInput.touched)">
            <small *ngIf="phoneInput.errors?.['required']">Phone is required.</small>
            <small *ngIf="phoneInput.errors?.['pattern']">Must be exactly 10 digits.</small>
          </div>
        </div>

        <!-- Role selection removed: only Shopkeeper can register -->
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary full-width" [disabled]="loading || !registerForm.valid">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="loader"></span>
      </button>
    </form>

    <div class="footer">
      <p>Already have an account? <a routerLink="/login">Sign In</a></p>
    </div>
  </div>
</div>
