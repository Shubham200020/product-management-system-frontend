<div class="forgot-password-container animate-fade-in">
  <div class="glass-card">
    <div class="header">
      <h1>Reset Password</h1>
      <p>Enter your registered details to set a new password</p>
    </div>

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" [(ngModel)]="request.email" required placeholder="example@email.com">
      </div>

      <div class="input-group">
        <label>Registered Phone Number</label>
        <input type="text" name="phone" [(ngModel)]="request.phone" required pattern="[0-9]{10}" placeholder="10 digit phone number">
      </div>

      <div class="input-group">
        <label>New Password</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" name="newPassword" [(ngModel)]="request.newPassword" required minlength="6" placeholder="••••••••">
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
            <span>{{ showPassword ? '👁️' : '🔒' }}</span>
          </button>
        </div>
      </div>

      <div class="input-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="request.confirmPassword" required placeholder="••••••••">
        <div class="field-error" *ngIf="request.newPassword && request.confirmPassword && request.newPassword !== request.confirmPassword">
          <small>Passwords do not match.</small>
        </div>
      </div>

      <div class="messages">
        <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary full-width" [disabled]="loading || !resetForm.valid || request.newPassword !== request.confirmPassword">
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
        <a routerLink="/login" class="back-link">Back to Login</a>
      </div>
    </form>
  </div>
</div>
